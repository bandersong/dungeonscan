name: DungeonScan
options:
  bundleIdPrefix: io.github.bandersong.dungeonscan
  deploymentTarget:
    macOS: "14.0"
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

# Native macOS shell for DungeonScan. Modeled on the proven ScrubBuddy
# WKWebView + MAS-sandbox pattern, but NO MLX: document/dungeon-cell perception
# is Apple Vision (OCR) + CoreML (classification) only. That means no SwiftPM
# packages and the MAS entitlements can DROP com.apple.security.cs.allow-
# unsigned-executable-memory (CoreML/Vision don't need executable memory), so
# the store build stays cleaner than ScrubBuddy's.
settings:
  base:
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    # Ad-hoc sign locally (no paid team yet). Sandbox/MAS entitlements are wired
    # below via CODE_SIGN_ENTITLEMENTS and applied at the real codesign step in
    # build_mas.sh — mirroring ScrubBuddy's build_swift_mas.sh.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

targets:
  DungeonScan:
    type: application
    platform: macOS
    dependencies:
      - package: Sparkle
    sources:
      # Swift sources (main, AppDelegate, NativeBridge).
      - path: DungeonScan
        excludes:
          - Web
          # The iOS shell lives in DungeonScan/ios/ (UIKit; compiled by the
          # DungeonScan-iOS target below). Exclude it from this macOS target so
          # the UIKit sources — and the duplicate AppDelegate.swift symbol —
          # never leak into the macOS build.
          - ios
          # Bundled below as explicit resources (folder ref / plain file).
          - DungeonCellClassifier.mlmodelc
          - TerrainClassifier.mlmodelc
          - labels.json
          - terrain_labels.json
          - AppIcon.icns
      # The HTML/JS UI ships as bundled resources (Web/index.html + siblings).
      - path: DungeonScan/Web
        buildPhase: resources
      # CoreML cell classifier — compiled .mlmodelc bundle copied whole into
      # Resources as a folder reference so the internal model0/model1/...
      # structure is preserved (NOT expanded into individual files). Lands at
      # DungeonScan.app/Contents/Resources/DungeonCellClassifier.mlmodelc.
      - path: DungeonScan/DungeonCellClassifier.mlmodelc
        buildPhase: resources
        type: folder
      # CoreML HEX terrain classifier — same folder-ref treatment as the cell
      # model. Lands at Contents/Resources/TerrainClassifier.mlmodelc. Picked by
      # name in NativeBridge.classify (model:"TerrainClassifier").
      - path: DungeonScan/TerrainClassifier.mlmodelc
        buildPhase: resources
        type: folder
      # Class-label vocabularies shipped next to their models.
      - path: DungeonScan/labels.json
        buildPhase: resources
      - path: DungeonScan/terrain_labels.json
        buildPhase: resources
      # App icon (raw .icns; referenced by CFBundleIconFile=AppIcon in Info.plist).
      - path: DungeonScan/AppIcon.icns
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.bandersong.dungeonscan
        INFOPLIST_FILE: DungeonScan/Info.plist
        # App Sandbox MAS entitlements (sandbox + network.client +
        # user-selected.read-write + bookmarks.app-scope). Applied by the
        # codesign step; ignored when CODE_SIGNING_ALLOWED=NO in local builds.
        CODE_SIGN_ENTITLEMENTS: DungeonScan.entitlements.mas
        ENABLE_HARDENED_RUNTIME: YES

  # ---------------------------------------------------------------------------
  # iOS (iPadOS) shell for DungeonScan. The ENTIRE app — CV, UI, export — is the
  # shared JS in DungeonScan/Web, loaded unchanged into a full-screen WKWebView.
  # Only the native shell differs from macOS: UIKit pickers/sheets in ios/
  # (IOSBridge) instead of AppKit panels. Vision + CoreML + PDFKit are cross-
  # platform, so the classify/ocr/rasterizePdf/capabilities logic is copied
  # verbatim from NativeBridge.swift. NO Sparkle (macOS-only).
  # ---------------------------------------------------------------------------
  DungeonScan-iOS:
    type: application
    platform: iOS
    sources:
      # iOS-only Swift shell (AppDelegate, SceneDelegate, WebViewController,
      # IOSBridge). Info.plist + entitlements are referenced below via build
      # settings, NOT bundled as resources, so exclude them from the source path.
      - path: DungeonScan/ios
        excludes:
          - Info.plist
          - DungeonScan-iOS.entitlements
          - Assets.xcassets
      # App icon asset catalog (single 1024px source; Xcode derives the rest).
      - path: DungeonScan/ios/Assets.xcassets
        buildPhase: resources
      # The shared HTML/JS UI — identical to the macOS target, bundled resources.
      - path: DungeonScan/Web
        buildPhase: resources
      # CoreML cell classifier — folder ref so the internal model0/model1/...
      # structure is preserved (same as macOS). Lands at
      # DungeonScan-iOS.app/DungeonCellClassifier.mlmodelc.
      - path: DungeonScan/DungeonCellClassifier.mlmodelc
        buildPhase: resources
        type: folder
      # CoreML HEX terrain classifier — same folder-ref treatment as the cell
      # model. Picked by name in IOSBridge.classify (model:"TerrainClassifier").
      - path: DungeonScan/TerrainClassifier.mlmodelc
        buildPhase: resources
        type: folder
      # Class-label vocabularies shipped next to their models.
      - path: DungeonScan/labels.json
        buildPhase: resources
      - path: DungeonScan/terrain_labels.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.bandersong.dungeonscan.ios
        INFOPLIST_FILE: DungeonScan/ios/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DungeonScan/ios/DungeonScan-iOS.entitlements

  # ---------------------------------------------------------------------------
  # Standalone Vision OCR CLI. Same VNRecognizeTextRequest path as NativeBridge
  # in the GUI app, but invocable from the shell for batch/scripted use (folder
  # scans, reproducible gates, piping room-number labels into other tools).
  # The source is a single script-style Swift file (top-level code, no @main),
  # so it ALSO runs directly via `swift tools/ocr.swift <img>` without Xcode.
  # Output JSON mirrors NativeBridge.ocr exactly.
  # ---------------------------------------------------------------------------
  DungeonScan-OCR:
    type: tool
    platform: macOS
    sources:
      # Named main.swift so the same file is a valid entry point BOTH for
      # `swift tools/main.swift <img>` (script mode, no Xcode) AND for this
      # Xcode `tool` target (which forbids top-level code except in main.swift).
      - path: ../tools/main.swift
    settings:
      base:
        PRODUCT_NAME: dsocr
        # macOS 14 keeps it aligned with the app target; Vision is available
        # far earlier so this could be lowered if a CI box needs it.
        MACOSX_DEPLOYMENT_TARGET: "14.0"
