<canvas id="c" width="1024" height="1024" style="width:512px;height:512px;background:#333"></canvas>
<div id="c2" style="margin-top:8px"></div>
<script>
const cv = document.getElementById('c'), x = cv.getContext('2d');
const S = 1024;
function squirclePath(ctx, X, Y, W, H, r) {
  // superellipse-ish rounded rect (macOS squircle approximation via arcs)
  ctx.beginPath();
  ctx.moveTo(X + r, Y);
  ctx.arcTo(X + W, Y, X + W, Y + H, r);
  ctx.arcTo(X + W, Y + H, X, Y + H, r);
  ctx.arcTo(X, Y + H, X, Y, r);
  ctx.arcTo(X, Y, X + W, Y, r);
  ctx.closePath();
}
function draw() {
  x.clearRect(0,0,S,S);
  // ---- squircle geometry (macOS: ~824 content in 1024 with soft shadow) ----
  const M = 100, W = S - 2*M, R = 185;
  // drop shadow
  x.save();
  x.shadowColor = 'rgba(0,0,0,0.30)'; x.shadowBlur = 40; x.shadowOffsetY = 22;
  squirclePath(x, M, M, W, W, R); x.fillStyle = '#000'; x.fill();
  x.restore();
  // ---- parchment background gradient ----
  squirclePath(x, M, M, W, W, R); x.save(); x.clip();
  let g = x.createLinearGradient(0, M, 0, M+W);
  g.addColorStop(0, '#f6ecd0'); g.addColorStop(1, '#e2cd9c');
  x.fillStyle = g; x.fillRect(M, M, W, W);
  // subtle paper vignette
  let rg = x.createRadialGradient(S/2, M+W*0.42, W*0.15, S/2, S/2, W*0.72);
  rg.addColorStop(0, 'rgba(255,255,255,0.10)'); rg.addColorStop(1, 'rgba(90,60,20,0.14)');
  x.fillStyle = rg; x.fillRect(M, M, W, W);

  // ---- dungeon floorplan (mirrors the app's stone output) ----
  // 6x6 grid inside an inner square
  const pad = 96, area = W - 2*pad, cell = area / 6;
  const ox = M + pad, oy = M + pad;
  const floorSet = new Set([
    '1,0','1,1','1,2','2,0','2,1','2,2','3,0','3,1','3,2','4,0','4,1','4,2', // left room
    '2,3',                                                                   // corridor
    '1,4','1,5','2,4','2,5','3,4','3,5'                                       // right room
  ]);
  const F = (r,c) => floorSet.has(r+','+c);
  // floor fills
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) if (F(r,c)) {
    x.fillStyle = '#fbf3df'; x.fillRect(ox+c*cell, oy+r*cell, cell, cell);
  }
  // faint grid on floors
  x.strokeStyle = 'rgba(70,52,26,0.30)'; x.lineWidth = Math.max(2, cell*0.028);
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) if (F(r,c)) {
    x.strokeRect(ox+c*cell, oy+r*cell, cell, cell);
  }
  // thick walls on floor / non-floor boundaries
  x.strokeStyle = '#241d13'; x.lineWidth = Math.max(10, cell*0.17); x.lineCap = 'round'; x.lineJoin = 'round';
  const seg = (x1,y1,x2,y2)=>{ x.beginPath(); x.moveTo(x1,y1); x.lineTo(x2,y2); x.stroke(); };
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) if (F(r,c)) {
    const X=ox+c*cell, Y=oy+r*cell;
    if (!F(r-1,c)) seg(X,Y,X+cell,Y);            // top
    if (!F(r+1,c)) seg(X,Y+cell,X+cell,Y+cell);  // bottom
    if (!F(r,c-1)) seg(X,Y,X,Y+cell);            // left
    if (!F(r,c+1)) seg(X+cell,Y,X+cell,Y+cell);  // right
  }
  // amber doorway accent on the corridor's top wall
  x.strokeStyle = '#c8851a'; x.lineWidth = Math.max(10, cell*0.17); x.lineCap = 'butt';
  seg(ox+3*cell+cell*0.20, oy+2*cell, ox+3*cell+cell*0.80, oy+2*cell);
  // stair glyph in the bottom of the left room (amber rungs)
  x.strokeStyle = '#b5731a'; x.lineWidth = Math.max(5, cell*0.06); x.lineCap = 'butt';
  for (let i=0;i<4;i++){ const yy = oy+3*cell + i*(cell*0.22)+cell*0.14; seg(ox+0.16*cell, yy, ox+1.05*cell, yy); }

  x.restore();
  // crisp squircle rim
  squirclePath(x, M, M, W, W, R); x.strokeStyle = 'rgba(70,45,15,0.35)'; x.lineWidth = 4; x.stroke();
  window.__png = cv.toDataURL('image/png');
  // small preview
  document.getElementById('c2').innerHTML = '<img src="'+window.__png+'" style="width:128px;height:128px;image-rendering:auto"> <img src="'+window.__png+'" style="width:64px;height:64px"> <img src="'+window.__png+'" style="width:32px;height:32px"> <img src="'+window.__png+'" style="width:16px;height:16px">';
}
draw();
</script>
